spring.application.name=Management

# Yleinen portti sovellukselle (oletus 8080)
server.port=8080

# --- H2 Tietokannan Konfiguraatio ---
# Käytetään tiedostopohjaista tilaa, joka säilyttää tiedot uudelleenkäynnistyksen jälkeen.
spring.datasource.url=jdbc:h2:file:./data/digierko;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=Dentapp
spring.datasource.password=admin

# --- JPA/Hibernate asetukset ---
# 'update' luo ja päivittää taulut automaattisesti luomiesi @Entity-luokkien (datamallien) perusteella.
spring.jpa.hibernate.ddl-auto=update

# Näytä kaikki ajettavat SQL-kyselyt konsolissa (hyödyllistä kehityksessä)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Konsoli (web-käyttöliittymä) ---
# Ottaa käyttöön H2-konsolin, joka on kätevä tietokannan selaamiseen.
# Pääset konsoliin osoitteessa http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console